# DeepStream nvinfer config for YOLO26n (5-stream batched, FP16, Jetson Nano)
#
# Specifically tuned for the engine produced by:
#   1) Colab/Docker: yolo26n.pt → ONNX with end2end=True, dynamic=True
#      (after Mod-surgery + Div(255) prepend → yolo26n_wpost_b5.onnx)
#   2) Nano:        ./venv/bin/python transform.py
#                       --onnx yolo26n_wpost_b5.onnx --input-name images_raw
#                   → yolo26n_b5.engine
#
# Key differences vs config_infer_yolov8.txt:
#   - network-type=100        (custom) — we parse output in the Python probe,
#                                          NOT via custom-lib-path
#   - output-tensor-meta=1    — attach raw output tensor to frame metadata so
#                                the probe can read (300, 6) directly
#   - parse-bbox-func-name    — NOT SET (would only apply for network-type=0)
#   - custom-lib-path         — NOT SET (no DeepStream-Yolo lib needed; end2end
#                                model already includes NMS)
#   - net-scale-factor=1.0    — Div(255) is BAKED into the ONNX, so we must
#                                NOT divide again here. nvinfer just sends RGB
#                                pixel values [0,255] straight in.
#   - offsets                 — leave at default 0;0;0 (no mean subtraction)

[property]
gpu-id=0
net-scale-factor=1.0
model-color-format=0
# Runtime uses the existing TensorRT engine below.
#onnx-file=yolo26n_wpost_b5.onnx
model-engine-file=model/detector.engine
batch-size=5
network-mode=2
num-detected-classes=80
interval=1
gie-unique-id=1
process-mode=1
network-type=100
output-tensor-meta=1
infer-dims=3;640;640
maintain-aspect-ratio=1
symmetric-padding=1
#workspace-size=2000

# No [class-attrs-all] needed — NMS is done inside the ONNX (end2end).

[sources]
CCTV01=rtsp://172.16.30.111:8554/cctv0
CCTV02=rtsp://172.16.30.111:8554/cctv1
CCTV03=rtsp://172.16.30.111:8554/cctv2
CCTV04=rtsp://172.16.30.111:8554/cctv3
CCTV05=rtsp://172.16.30.111:8554/cctv4

[app]
infer-config=config.conf
log-csv=v4_brandy.log
brand-engine=model/classy.engine
conf-threshold=0.25
car-class-id=2
brand-max-batch=16
report-every-s=30
csv-flush-every-rows=60
muxer-width=640
muxer-height=640
batched-push-timeout-us=50000
max-det-per-image=300
det-features=6
coco-classes=person,bicycle,car,motorcycle,airplane,bus,train,truck,boat,traffic light,fire hydrant,stop sign,parking meter,bench,bird,cat,dog,horse,sheep,cow,elephant,bear,zebra,giraffe,backpack,umbrella,handbag,tie,suitcase,frisbee,skis,snowboard,sports ball,kite,baseball bat,baseball glove,skateboard,surfboard,tennis racket,bottle,wine glass,cup,fork,knife,spoon,bowl,banana,apple,sandwich,orange,broccoli,carrot,hot dog,pizza,donut,cake,chair,couch,potted plant,bed,dining table,toilet,tv,laptop,mouse,remote,keyboard,cell phone,microwave,oven,toaster,sink,refrigerator,book,clock,vase,scissors,teddy bear,hair drier,toothbrush
